<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Loan Applications</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">All Loan Applications</h2>

    <!-- ✅ Total Loan Count -->
    <p th:text="'Total Loans: ' + ${loanPage.totalElements}" class="text-end fw-bold"></p>

    <!-- ✅ No Data Message -->
    <div th:if="${loanPage.totalElements == 0}">
        <p class="text-center text-muted">No loan applications found.</p>
    </div>

    <!-- ✅ Loan Table -->
    <div th:if="${loanPage.totalElements > 0}">
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>
                    <a th:href="@{/admin/applications(sortBy='fullName', sortDir=${reverseSortDir})}" class="text-white text-decoration-none">Name</a>
                </th>
                <th>DOB</th>
                <th>PAN</th>
                <th>Aadhar</th>
                <th>Loan Type</th>
                <th>
                    <a th:href="@{/admin/applications(sortBy='loanAmount', sortDir=${reverseSortDir})}" class="text-white text-decoration-none">Amount</a>
                </th>
                <th>Income</th>
                <th>Employment</th>
                <th>Reason</th>
                <th>
                    <a th:href="@{/admin/applications(sortBy='submittedAt', sortDir=${reverseSortDir})}" class="text-white text-decoration-none">Submitted At</a>
                </th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="loan : ${loanPage.content}">
                <td th:text="${loan.id}"></td>
                <td th:text="${loan.fullName}"></td>
                <td th:text="${loan.dob}"></td>
                <td th:text="${loan.panNumber}"></td>
                <td th:text="${loan.aadharNumber}"></td>
                <td th:text="${loan.loanType}"></td>
                <td th:text="${loan.loanAmount}"></td>
                <td th:text="${loan.monthlyIncome}"></td>
                <td th:text="${loan.employmentType}"></td>
                <td th:text="${loan.reason}"></td>
                <td th:text="${#temporals.format(loan.submittedAt, 'dd-MM-yyyy HH:mm')}"></td>
                <td>
                    <span th:if="${loan.status == 'APPROVED'}" th:text="${loan.status}" class="text-success fw-bold"></span>
                    <span th:if="${loan.status == 'REJECTED'}" th:text="${loan.status}" class="text-danger fw-bold"></span>
                    <span th:if="${loan.status != 'APPROVED' and loan.status != 'REJECTED'}" th:text="${loan.status}" class="text-warning fw-bold"></span>
                </td>
                <td>
                    <!-- Approve Form -->
                    <form th:action="@{/admin/updateStatus}" method="post" style="display:inline;">
                        <input type="hidden" name="id" th:value="${loan.id}" />
                        <input type="hidden" name="status" value="APPROVED" />
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-success btn-sm mb-1">Approve</button>
                    </form>

                    <!-- Reject Button -->
                    <button type="button" class="btn btn-danger btn-sm" 
                            th:attr="onclick=|toggleRejectForm('${loan.id}')|">
                        Reject
                    </button>

                    <!-- Reject Form with Comment -->
                    <form th:action="@{/admin/updateStatus}" method="post" 
                          th:id="'rejectForm-' + ${loan.id}" 
                          style="display:none; margin-top:5px;">
                        <input type="hidden" name="id" th:value="${loan.id}" />
                        <input type="hidden" name="status" value="REJECTED" />
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="form-group mb-1">
                            <textarea name="comment" class="form-control" placeholder="Enter reason for rejection" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-outline-danger btn-sm">Submit Rejection</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- ✅ Pagination Controls -->
        <nav>
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/applications(page=${currentPage - 1}, sortBy=${sortBy}, sortDir=${sortDir})}">Previous</a>
                </li>
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:text="${i + 1}"
                       th:href="@{/admin/applications(page=${i}, sortBy=${sortBy}, sortDir=${sortDir})}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/applications(page=${currentPage + 1}, sortBy=${sortBy}, sortDir=${sortDir})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<!-- ✅ JavaScript to toggle the comment box -->
<script>
    function toggleRejectForm(id) {
        const form = document.getElementById('rejectForm-' + id);
        if (form) {
            form.style.display = (form.style.display === 'none' || form.style.display === '') ? 'block' : 'none';
        }
    }
</script>

</body>
</html>
