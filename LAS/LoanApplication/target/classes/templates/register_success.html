<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registration Successful</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .success-container {
            background-color: #fff;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .success-container h1 {
            color: #28a745;
            margin-bottom: 20px;
        }

        .success-container p {
            font-size: 16px;
            color: #555;
            margin-bottom: 30px;
        }

        .btn-login {
            padding: 12px 25px;
            background-color: #2575fc;
            color: white;
            font-size: 16px;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.3s ease;
        }

        .btn-login:hover {
            background-color: #1e63d1;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <h1>🎉 Success!</h1>
        <p>Your account has been created successfully.</p>
        <a th:href="@{/login}" class="btn-login">Go to Login</a>
    </div>
</body>
</html>
