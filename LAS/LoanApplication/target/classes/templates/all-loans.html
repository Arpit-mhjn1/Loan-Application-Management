<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Loan Applications</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2 class="mb-4">All Loan Applications</h2>
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>DOB</th>
                <th>Loan Type</th>
                <th>Loan Amount</th>
                <th>Monthly Income</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="loan : ${loans}">
                <td th:text="${loan.id}"></td>
                <td th:text="${loan.fullName}"></td>
                <td th:text="${loan.dob}"></td>
                <td th:text="${loan.loanType}"></td>
                <td th:text="${loan.loanAmount}"></td>
                <td th:text="${loan.monthlyIncome}"></td>
                <td th:text="${loan.status}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
