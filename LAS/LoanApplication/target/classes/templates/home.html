<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Loan Application Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            animation: fadeIn 1s ease-in;
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            padding: 40px;
            background-color: white;
            text-align: center;
        }

        .btn-custom {
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            background-color: #343a40;
            color: white;
            padding: 15px 0;
            text-align: center;
        }

        .navbar-brand img {
            height: 40px;
            margin-right: 10px;
        }

        .navbar {
            background-color: #ffffffcc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light px-4">
    <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="https://cdn-icons-png.flaticon.com/512/201/201623.png" alt="Logo">
        <strong>Loan Portal</strong>
    </a>
</nav>

<!-- Main Section -->
<div class="main-content">
    <div class="card">
        <h1 class="mb-3 text-primary">Loan Application Management</h1>
        <p class="lead mb-4">Fast, Simple & Secure Way to Apply for Loans</p>
        <div class="d-grid gap-3 col-8 col-md-6 mx-auto">
            <a class="btn btn-primary btn-custom" th:href="@{/loan/form}">Apply for a Loan</a>
            <a class="btn btn-dark btn-custom" th:href="@{/login}">Login</a>
			<a class="btn btn-primary btn-custom" th:href="@{/register}">Join Us Now</a>
            <a class="btn btn-success btn-custom" th:href="@{/track}">Track Loan Status</a> <!-- ✅ Added -->
        </div>
    </div>
</div>

<!-- Footer -->
<footer>
    &copy; 2025 Loan Application Portal | Developed by Karanveer's Team
</footer>

</body>
</html>
