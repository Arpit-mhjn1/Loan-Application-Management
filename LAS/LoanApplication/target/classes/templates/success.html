<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Application Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #28a745;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 0 10px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>
<div class="container text-center success-box">
    <h2 class="display-5">🎉 Application Submitted Successfully!</h2>
    <p class="lead">Thank you for applying. We’ll review your application and get back to you soon.</p>
    
    <p class="mt-4 fs-5">
        📌 <strong>Your Application ID:</strong>
        <span th:text="${applicationId}">12345</span>
    </p>

    <a href="/loan/form" class="btn btn-light btn-lg rounded-pill shadow-sm mt-3">Apply Again</a>
</div>
</body>
</html>
