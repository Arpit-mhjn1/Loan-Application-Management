<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Loan Application Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg rounded-4">
        <div class="card-header bg-primary text-white text-center">
            <h2 class="mb-0">Loan Application Form</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/loan/submit}" th:object="${loan}" method="post">
                <!-- CSRF Token -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <!-- Full Name -->
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" th:field="*{fullName}" class="form-control" placeholder="Enter your full name" required />
                </div>

                <!-- Date of Birth -->
                <div class="mb-3">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" th:field="*{dob}" class="form-control" required />
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="example@email.com" required />
                </div>

                <!-- PAN Number -->
                <div class="mb-3">
                    <label class="form-label">PAN Number</label>
                    <input type="text" th:field="*{panNumber}" class="form-control" placeholder="ABCDE1234F" maxlength="10" required />
                </div>

                <!-- Aadhar Number -->
                <div class="mb-3">
                    <label class="form-label">Aadhar Number</label>
                    <input type="text" th:field="*{aadharNumber}" class="form-control" placeholder="123456789012" maxlength="12" required />
                </div>

                <!-- File Upload 
                <div class="mb-3">
                    <label class="form-label">Upload Supporting Documents (PDF/Image)</label>
					<input type="file" class="form-control" name="file" required onchange="previewFile()" />
                    <small class="form-text text-muted">Max 10 files, each up to 10MB</small>
                    <div class="mt-2" id="file-preview"></div>
                </div>-->

                <!-- Loan Type -->
                <div class="mb-3">
                    <label class="form-label">Loan Type</label>
                    <select th:field="*{loanType}" class="form-select" required>
                        <option value="">Select Loan Type</option>
                        <option value="Personal">Personal</option>
                        <option value="Home">Home</option>
                        <option value="Business">Business</option>
                    </select>
                </div>

                <!-- Loan Amount -->
                <div class="mb-3">
                    <label class="form-label">Loan Amount (₹)</label>
                    <input type="number" th:field="*{loanAmount}" class="form-control" min="1000" step="100" required />
                </div>

                <!-- Monthly Income -->
                <div class="mb-3">
                    <label class="form-label">Monthly Income (₹)</label>
                    <input type="number" th:field="*{monthlyIncome}" class="form-control" min="0" required />
                </div>

                <!-- Employment Type -->
                <div class="mb-3">
                    <label class="form-label">Employment Type</label>
                    <input type="text" th:field="*{employmentType}" class="form-control" placeholder="Salaried / Self-employed" required />
                </div>

                <!-- Reason for Loan -->
                <div class="mb-3">
                    <label class="form-label">Reason for Loan</label>
                    <textarea th:field="*{reason}" class="form-control" rows="3" placeholder="Write your reason" required></textarea>
                </div>

                <!-- Submit Button -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg rounded-pill">Submit Application</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    function previewFile() {
        const preview = document.getElementById("file-preview");
        const file = document.querySelector('input[name="file"]').files[0];
        preview.innerHTML = "";

        if (file && file.type.startsWith("image")) {
            const img = document.createElement("img");
            img.src = URL.createObjectURL(file);
            img.className = "img-thumbnail mt-2";
            img.style.maxWidth = "100px";
            preview.appendChild(img);
        } else if (file && file.type === "application/pdf") {
            const pdf = document.createElement("p");
            pdf.textContent = "📄 " + file.name;
            preview.appendChild(pdf);
        } else {
            const unsupported = document.createElement("p");
            unsupported.textContent = "❌ Unsupported: " + file.name;
            preview.appendChild(unsupported);
        }
    }
</script>

</body>
</html>
