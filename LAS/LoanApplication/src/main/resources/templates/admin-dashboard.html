<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <script>
        function toggleComment(selectElement, id) {
            const commentBox = document.getElementById("comment-" + id);
            if (selectElement.value === "REJECTED") {
                commentBox.style.display = "block";
                commentBox.setAttribute("required", "required");
            } else {
                commentBox.style.display = "none";
                commentBox.removeAttribute("required");
            }
        }
    </script>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Loan Admin</a>

        <div class="d-flex">
            <a th:href="@{/admin/applications}" class="btn btn-outline-light me-2">View Applications</a>

            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-outline-danger">Logout</button>
            </form>
        </div>
    </div>
</nav>

<!-- Content -->
<div class="container mt-5">
    <h2 class="text-center mb-4">Welcome to Admin Dashboard</h2>

    <div class="table-responsive">
        <table class="table table-bordered table-striped text-center align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Applicant Name</th>
                    <th>Loan Amount</th>
                    <th>Status</th>
                    <th>Update Status</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="app : ${applications}">
                    <td th:text="${app.id}">1</td>
                    <td th:text="${app.fullName}">Mandeep Kumar</td>
                    <td th:text="${#numbers.formatDecimal(app.loanAmount, 0, 'COMMA', 2, 'POINT')}">50,000.00</td>
                    <td th:text="${app.status}">PENDING</td>

                    <!-- Update Status Form -->
                    <td>
                        <form th:action="@{/admin/updateStatus}" method="post" class="d-flex flex-column align-items-center">
                            <input type="hidden" name="id" th:value="${app.id}" />
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <select name="status" class="form-select mb-2 w-100"
                                    onchange="toggleComment(this, [[${app.id}]])">
                                <option value="PENDING" th:selected="${app.status == 'PENDING'}">Pending</option>
                                <option value="APPROVED" th:selected="${app.status == 'APPROVED'}">Approved</option>
                                <option value="REJECTED" th:selected="${app.status == 'REJECTED'}">Rejected</option>
                            </select>

                            <!-- Rejection comment textarea -->
                            <textarea name="comment" id="comment-[[${app.id}]]"
                                      placeholder="Reason for rejection"
                                      class="form-control mb-2 w-100"
                                      style="display:none;"></textarea>

                            <button type="submit" class="btn btn-sm btn-success w-100">Update</button>
                        </form>
                    </td>

                    <!-- Delete Button -->
                    <td>
                        <form th:action="@{'/admin/delete/' + ${app.id}}" method="get"
                              onsubmit="return confirm('Are you sure you want to delete this application?');">
                            <button type="submit" class="btn btn-sm btn-danger w-100">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
